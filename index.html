<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WowProducts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.home-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #232f3e 0%, #0f1111 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .home-container {
            text-align: center;
        }

        .show-products-btn {
            background-color: #ff9900;
            color: #0f1111;
            border: none;
            padding: 18px 48px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .show-products-btn:hover {
            background-color: #ffac31;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="home-page">
    <div class="home-container">
        <button class="show-products-btn" onclick="location.href='products.html'">
            🔥 View All Deals 🔥
        </button>
    </div>
</body>
</html>
