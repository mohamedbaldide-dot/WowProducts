<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متجرك - تسوق أونلاين</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- ==================== الهيدر ==================== -->
    <header class="header">
        <div class="logo">
            <h1 id="logo-text">متجرك</h1>
        </div>

        <!-- ==================== شريط البحث مثل أمازون ==================== -->
        <div class="search-container">
            <div class="search-dropdown">
                <button class="dropdown-btn" id="dropdownBtn">الكل <i class="fas fa-chevron-down"></i></button>
                <div class="dropdown-content" id="dropdownContent">
                    <a href="#" data-section="all">جميع الأقسام</a>
                    <a href="#" data-section="cod">الدفع عند الاستلام</a>
                    <a href="#" data-section="amazon">أجهزة Amazon</a>
                    <a href="#" data-section="electronics">إلكترونيات</a>
                    <a href="#" data-section="home">منزل</a>
                    <a href="#" data-section="fashion">موضة</a>
                    <a href="#" data-section="sports">رياضة</a>
                </div>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="البحث في متجرك...">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        </div>

        <!-- ==================== اللغة والسلة ==================== -->
        <div class="header-actions">
            <div class="language-selector" id="languageSelector">
                <div class="lang-btn">
                    <img src="images/saudi-flag.webp" alt="SA" class="flag-icon">
                    <span id="currentLang">AR</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="lang-dropdown" id="langDropdown">
                    <a href="#" data-lang="ar">العربية - AR</a>
                    <a href="#" data-lang="en">English - EN</a>
                    <div class="lang-footer">أنت تتسوق على Amazon.sa</div>
                </div>
            </div>
            <i class="fas fa-shopping-cart"></i>
        </div>
    </header>

    <!-- ==================== HERO SLIDER ==================== -->
    <section class="hero-slider">
        <div class="slider-container">
            <div class="slider">
                <div class="slide active">
                    <img src="images/banners/banner1.webp" alt="Banner 1">
                </div>
                <div class="slide">
                    <img src="images/banners/banner2.webp" alt="Banner 2">
                </div>
                <div class="slide">
                    <img src="images/banners/banner3.webp" alt="Banner 3">
                </div>
            </div>
            <button class="slider-btn prev" id="prevBtn"><i class="fas fa-chevron-right"></i></button>
            <button class="slider-btn next" id="nextBtn"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="slider-dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
        </div>
    </section>

    <!-- ==================== FADE EFFECT ==================== -->
    <div class="fade-overlay"></div>

    <!-- ==================== CATEGORY BOXES ==================== -->
    <section class="categories">
        <div class="categories-grid" id="categoriesGrid">
            <!-- البطاقات تظهر هنا عبر JavaScript -->
        </div>
    </section>

    <!-- ==================== PRODUCTS SECTION ==================== -->
    <section class="products-section" id="productsSection">
        <div class="container">
            <div class="section-header">
                <h2 id="products-title">منتجات مميزة</h2>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p id="footer-text">&copy; 2025 متجرك. جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/products.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
