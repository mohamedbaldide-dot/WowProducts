<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تفاصيل المنتج - متجرك</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* كل الأنماط موجودة كما هي - لم تتغير */
        .product-detail-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        @media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; padding: 20px; } }
        
        .product-gallery-wrapper { display: flex; gap: 20px; direction: ltr; }
        .thumbnail-vertical { display: flex; flex-direction: column; gap: 12px; width: 100px; flex-shrink: 0; order: 2; }
        .thumbnail-vertical .thumb { width: 35px; height: 35px; background: transparent; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s ease; overflow: hidden; }
        .thumbnail-vertical .thumb img { width: 100%; height: 100%; object-fit: contain; }
        .thumbnail-vertical .thumb:hover { border-color: #ff9900; transform: scale(1.02); }
        .thumbnail-vertical .thumb.active { border-color: #ff9900; box-shadow: 0 0 0 2px rgba(255,153,0,0.3); }
        .main-image-large { flex: 1; background: transparent; border-radius: 0; display: flex; align-items: center; justify-content: center; aspect-ratio: 1 / 1; overflow: hidden; order: 1; }
        .main-image-large img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s ease; }
        .main-image-large img:hover { transform: scale(1.05); }
        @media (max-width: 768px) { .product-gallery-wrapper { flex-direction: column; } .thumbnail-vertical { flex-direction: row; width: 100%; justify-content: center; order: 2; margin-top: 15px; } .main-image-large { order: 1; } }
        
        .product-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; width: fit-content; }
        .product-title { font-size: 28px; font-weight: bold; color: #111; margin: 0 0 15px 0; }
        .product-price-section { background: #f8f8f8; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .current-price { font-size: 32px; font-weight: bold; color: #b12704; }
        .old-price { font-size: 18px; color: #565959; text-decoration: line-through; margin-left: 10px; }
        .discount { font-size: 16px; color: #28a745; font-weight: bold; }
        .features-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .features-list li { padding: 8px 0; display: flex; align-items: center; gap: 10px; }
        .features-list li i { color: #28a745; font-size: 18px; }
        .trust-badges { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; padding: 15px; background: #f8f8f8; border-radius: 12px; }
        .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
        .trust-item i { font-size: 18px; color: #28a745; }
        .order-btn { width: 100%; padding: 18px; background: #ff9900; color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .order-btn:hover { background: #e68a00; }
        .product-description { margin-top: 40px; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .product-description h3 { font-size: 22px; margin-bottom: 20px; color: #111; }
        .product-description p { line-height: 1.8; color: #555; margin-bottom: 15px; }
        .order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .order-modal.active { display: flex; }
        .order-modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; }
        .order-modal-content h3 { font-size: 24px; margin-bottom: 20px; }
        .close-modal { position: absolute; top: 15px; left: 20px; font-size: 24px; cursor: pointer; color: #999; }
        .close-modal:hover { color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .submit-order-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .submit-order-btn:hover { background: #218838; }
        .success-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .success-card { background: white; border-radius: 24px; padding: 40px; max-width: 600px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .success-icon { width: 80px; height: 80px; background: #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .success-icon i { font-size: 45px; color: white; }
        .success-card h2 { font-size: 28px; color: #28a745; margin-bottom: 10px; }
        .order-number { background: #f8f8f8; padding: 15px; border-radius: 12px; margin: 20px 0; direction: ltr; }
        .order-number span { font-size: 20px; font-weight: bold; color: #ff9900; letter-spacing: 1px; }
        .steps { display: flex; justify-content: space-between; margin: 30px 0; flex-wrap: wrap; gap: 15px; }
        .step { flex: 1; text-align: center; min-width: 100px; }
        .step-circle { width: 40px; height: 40px; background: #ff9900; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; color: white; font-weight: bold; }
        .step p { font-size: 12px; color: #666; }
        .order-info { background: #f8f8f8; border-radius: 12px; padding: 20px; text-align: right; margin: 20px 0; }
        .order-info-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .order-info-item:last-child { border-bottom: none; }
        .success-buttons { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .btn-continue { flex: 1; padding: 14px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        .btn-track { flex: 1; padding: 14px; background: #f8f8f8; color: #333; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        .btn-track:hover { background: #e9ecef; }
        .btn-continue:hover { background: #218838; }
        .trust-footer { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .trust-footer span { font-size: 12px; color: #666; }
        .trust-footer i { color: #28a745; margin-left: 5px; }
        .not-found { text-align: center; padding: 50px; }
        .not-found a { color: #ff9900; text-decoration: none; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><h1>متجرك</h1></div>
        <div class="search-container">
            <div class="search-dropdown"><button class="dropdown-btn">الكل <i class="fas fa-chevron-down"></i></button></div>
            <input type="text" class="search-input" placeholder="ابحث في متجرك...">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-actions">
            <div class="language-selector">
                <div class="lang-btn">
                    <img src="images/saudi-flag.webp" alt="SA" class="flag-icon">
                    <span>AR</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <i class="fas fa-shopping-cart"></i>
        </div>
    </header>

    <div id="mainContent"></div>

    <footer class="footer">
        <div class="container"><p>&copy; 2025 متجرك. جميع الحقوق محفوظة</p></div>
    </footer>

    <div class="order-modal" id="orderModal">
        <div class="order-modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h3>طلب منتج</h3>
            <form id="orderForm">
                <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>العنوان</label><input type="text" id="address" required></div>
                <button type="submit" class="submit-order-btn">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script src="js/my-products-data.js"></script>
    <script src="js/product-details.js"></script>
    <script>
        function generateOrderNumber() {
            const date = new Date();
            const year = date.getFullYear();
            const random = Math.floor(Math.random() * 10000).toString().padStart(5, '0');
            return `SA-${year}-${random}`;
        }

        // ========================================
        // رابط Google Apps Script
        // ========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3bkMBSrIFsxoO9V2li8w7dX0M42Qp8aKPXLJYuBbD3gf8xTViV2VvR_aMC6BdohQT/exec';

        // إرسال الطلب إلى Google Sheets
        async function sendToGoogleSheets(orderData) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                console.log('✅ تم إرسال الطلب إلى Google Sheets');
                return true;
            } catch (error) {
                console.error('❌ خطأ في الإرسال:', error);
                return false;
            }
        }

        function showSuccessPage(orderData) {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="success-page">
                    <div class="success-card">
                        <div class="success-icon"><i class="fas fa-check"></i></div>
                        <h2>✅ تم استلام طلبك بنجاح</h2>
                        <div class="order-number"><span>#${orderData.orderNumber}</span></div>
                        <div class="steps">
                            <div class="step"><div class="step-circle">1</div><p>مراجعة الطلب</p></div>
                            <div class="step"><div class="step-circle">2</div><p>التواصل معك</p></div>
                            <div class="step"><div class="step-circle">3</div><p>شحن المنتج</p></div>
                            <div class="step"><div class="step-circle">4</div><p>الدفع عند الاستلام</p></div>
                        </div>
                        <div class="order-info">
                            <h4 style="margin-bottom: 15px;">📋 معلومات الطلب</h4>
                            <div class="order-info-item"><span>المنتج:</span><strong>${orderData.productName}</strong></div>
                            <div class="order-info-item"><span>السعر:</span><strong>${orderData.price} ر.س</strong></div>
                            <div class="order-info-item"><span>الكمية:</span><strong>1</strong></div>
                            <div class="order-info-item"><span>العنوان:</span><strong>${orderData.address || 'غير محدد'}</strong></div>
                        </div>
                        <div class="success-buttons">
                            <a href="index.html" class="btn-continue">🛒 متابعة التسوق</a>
                            <button class="btn-track" onclick="alert('🔜 سيتم إضافة خاصية تتبع الطلب قريباً')">📦 تتبع الطلب</button>
                        </div>
                        <div class="trust-footer">
                            <span><i class="fas fa-lock"></i> بياناتك محفوظة وآمنة</span>
                            <span><i class="fas fa-truck"></i> شحن سريع داخل السعودية</span>
                            <span><i class="fas fa-money-bill-wave"></i> الدفع عند الاستلام</span>
                            <span><i class="fas fa-headset"></i> دعم العملاء متوفر</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProductDetail(product, productDetails) {
            const container = document.getElementById('mainContent');
            const images = productDetails?.images || [product.image];
            
            container.innerHTML = `
                <div class="product-detail-container">
                    <div class="product-detail-grid">
                        <div class="product-gallery-wrapper">
                            <div class="main-image-large">
                                <img src="${images[0]}" id="mainImage" alt="الصورة الرئيسية" onerror="this.src='https://placehold.co/600x600?text=Product'">
                            </div>
                            <div class="thumbnail-vertical" id="thumbnailVertical">
                                ${images.map((img, idx) => `
                                    <div class="thumb ${idx === 0 ? 'active' : ''}" data-img="${img}">
                                        <img src="${img}" alt="صورة ${idx + 1}" onerror="this.src='https://placehold.co/80x80?text=Img'">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="product-info">
                            <span class="product-badge" style="background: ${product.badgeColor}; color: white;">${product.badge}</span>
                            <h1 class="product-title">${product.title}</h1>
                            <div class="product-price-section">
                                <span class="current-price">${product.price} ر.س</span>
                                <span class="old-price">${product.oldPrice} ر.س</span>
                                <span class="discount">-${product.discount}%</span>
                            </div>
                            <ul class="features-list">
                                ${(productDetails?.features || ["منتج عالي الجودة", "ضمان شامل", "شحن سريع"]).map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                            </ul>
                            <div class="trust-badges">
                                <div class="trust-item"><i class="fas fa-money-bill-wave"></i> الدفع عند الاستلام</div>
                                <div class="trust-item"><i class="fas fa-truck-fast"></i> شحن سريع داخل السعودية</div>
                                <div class="trust-item"><i class="fas fa-shield-alt"></i> ضمان الاستبدال</div>
                                <div class="trust-item"><i class="fas fa-headset"></i> خدمة العملاء</div>
                            </div>
                            <button class="order-btn" id="orderBtn">اطلب الآن</button>
                        </div>
                    </div>
                    <div class="product-description">
                        <h3>وصف المنتج</h3>
                        ${(productDetails?.description || `${product.title} هو منتج مميز بتقنيات حديثة.`).split('\n').map(p => `<p>${p}</p>`).join('')}
                    </div>
                </div>
            `;
            
            const thumbs = document.querySelectorAll('.thumb');
            const mainImage = document.getElementById('mainImage');
            thumbs.forEach(thumb => {
                thumb.addEventListener('click', () => {
                    thumbs.forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    mainImage.src = thumb.getAttribute('data-img');
                });
            });
            
            document.getElementById('orderBtn').addEventListener('click', () => {
                document.getElementById('orderModal').classList.add('active');
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        let product = null;
        let productDetailsData = null;

        if (typeof myProducts !== 'undefined') {
            product = myProducts.find(p => p.id === productId);
        }
        if (typeof productsDetails !== 'undefined' && productsDetails[productId]) {
            productDetailsData = productsDetails[productId];
        }

        if (!product && !productDetailsData) {
            document.getElementById('mainContent').innerHTML = `<div class="not-found"><h2>المنتج غير موجود</h2><a href="index.html">العودة للرئيسية</a></div>`;
        } else {
            const finalProduct = product || productDetailsData;
            renderProductDetail(finalProduct, productDetailsData);
        }

        const modal = document.getElementById('orderModal');
        const closeModal = document.getElementById('closeModal');
        if (closeModal) closeModal.onclick = () => modal.classList.remove('active');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

        const orderForm = document.getElementById('orderForm');
        const currentProduct = product || productDetailsData;

        if (orderForm && currentProduct) {
            orderForm.onsubmit = async (e) => {
                e.preventDefault();
                
                const orderData = {
                    orderNumber: generateOrderNumber(),
                    date: new Date().toLocaleString('ar-SA'),
                    productName: currentProduct.title,
                    price: currentProduct.price,
                    quantity: 1,
                    name: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                };
                
                // إرسال إلى Google Sheets
                await sendToGoogleSheets(orderData);
                
                modal.classList.remove('active');
                showSuccessPage(orderData);
                document.getElementById('orderForm').reset();
            };
        }
    </script>
</body>
</html>
