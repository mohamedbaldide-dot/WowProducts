<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تفاصيل المنتج - متجرك</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* product page specific styles */
        .product-detail-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        @media (max-width: 768px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px;
            }
        }
        
        /* معرض الصور */
        .product-gallery {
            position: sticky;
            top: 100px;
        }
        
        @media (max-width: 768px) {
            .product-gallery {
                position: relative;
                top: 0;
            }
        }
        
        .main-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f8f8f8;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .thumbnail {
            aspect-ratio: 1 / 1;
            background: #f8f8f8;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .thumbnail.active {
            border-color: #ff9900;
        }
        
        .thumbnail img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
        
        /* معلومات المنتج */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            width: fit-content;
        }
        
        .product-title {
            font-size: 28px;
            font-weight: bold;
            color: #111;
            margin: 0;
        }
        
        .product-price-section {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
        }
        
        .current-price {
            font-size: 32px;
            font-weight: bold;
            color: #b12704;
        }
        
        .old-price {
            font-size: 18px;
            color: #565959;
            text-decoration: line-through;
            margin-left: 10px;
        }
        
        .discount {
            font-size: 16px;
            color: #28a745;
            font-weight: bold;
        }
        
        /* مميزات المنتج */
        .features-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .features-list li {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .features-list li i {
            color: #28a745;
            font-size: 18px;
        }
        
        /* قسم الثقة */
        .trust-badges {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 12px;
        }
        
        .trust-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
        }
        
        .trust-item i {
            font-size: 18px;
            color: #28a745;
        }
        
        /* زر الطلب */
        .order-btn {
            width: 100%;
            padding: 18px;
            background: #ff9900;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .order-btn:hover {
            background: #e68a00;
        }
        
        /* وصف المنتج */
        .product-description {
            margin-top: 40px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .product-description h3 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #111;
        }
        
        .product-description p {
            line-height: 1.8;
            color: #555;
            margin-bottom: 15px;
        }
        
        .product-description ul {
            margin: 15px 0;
            padding-right: 20px;
        }
        
        .product-description li {
            margin-bottom: 8px;
            color: #555;
        }
        
        /* منتجات مشابهة */
        .similar-products {
            margin-top: 40px;
        }
        
        .similar-products h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .similar-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
        
        .similar-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
            padding: 15px;
        }
        
        .similar-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .similar-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        .similar-card h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #111;
        }
        
        .similar-card .similar-price {
            font-size: 16px;
            font-weight: bold;
            color: #b12704;
        }
        
        /* نموذج الطلب */
        .order-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .order-modal.active {
            display: flex;
        }
        
        .order-modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .order-modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .close-modal:hover {
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .submit-order-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .submit-order-btn:hover {
            background: #218838;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        
        .not-found {
            text-align: center;
            padding: 50px;
        }
        
        .not-found a {
            color: #ff9900;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>متجرك</h1>
        </div>
        <div class="search-container">
            <div class="search-dropdown">
                <button class="dropdown-btn">الكل <i class="fas fa-chevron-down"></i></button>
            </div>
            <input type="text" class="search-input" placeholder="ابحث في متجرك...">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-actions">
            <div class="language-selector">
                <div class="lang-btn">
                    <img src="images/saudi-flag.webp" alt="SA" class="flag-icon">
                    <span>AR</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <i class="fas fa-shopping-cart"></i>
        </div>
    </header>

    <div class="product-detail-container" id="productDetailContainer">
        <div class="loading">جاري تحميل المنتج...</div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 متجرك. جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <!-- نموذج الطلب -->
    <div class="order-modal" id="orderModal">
        <div class="order-modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h3>طلب منتج</h3>
            <form id="orderForm">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>المدينة</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label>ملاحظات (اختياري)</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <button type="submit" class="submit-order-btn">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script src="js/my-products-data.js"></script>
    <script src="js/product-details.js"></script>
    <script>
        // الحصول على معرف المنتج من URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        
        let currentProduct = null;
        
        function renderProductDetail() {
            const container = document.getElementById('productDetailContainer');
            
            // جلب بيانات المنتج من ملف product-details.js
            currentProduct = getProductDetails(productId);
            
            if (!currentProduct) {
                container.innerHTML = `
                    <div class="not-found">
                        <h2>المنتج غير موجود</h2>
                        <p>عذراً، لم نتمكن من العثور على المنتج المطلوب.</p>
                        <a href="index.html">العودة إلى الرئيسية</a>
                    </div>
                `;
                return;
            }
            
            const images = currentProduct.images || [currentProduct.image];
            
            container.innerHTML = `
                <div class="product-detail-grid">
                    <div class="product-gallery">
                        <div class="main-image">
                            <img src="${images[0]}" alt="${currentProduct.title}" id="mainImage" onerror="this.src='https://placehold.co/600x600?text=Product'">
                        </div>
                        <div class="thumbnail-grid" id="thumbnailGrid">
                            ${images.map((img, idx) => `
                                <div class="thumbnail ${idx === 0 ? 'active' : ''}" data-img="${img}">
                                    <img src="${img}" alt="صورة ${idx + 1}" onerror="this.src='https://placehold.co/100x100?text=Img'">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="product-info">
                        <span class="product-badge" style="background: ${currentProduct.badgeColor}; color: white;">${currentProduct.badge}</span>
                        <h1 class="product-title">${currentProduct.title}</h1>
                        
                        <div class="product-price-section">
                            <span class="current-price">${currentProduct.price} ر.س</span>
                            <span class="old-price">${currentProduct.oldPrice} ر.س</span>
                            <span class="discount">-${currentProduct.discount}%</span>
                        </div>
                        
                        <ul class="features-list">
                            ${currentProduct.features.map(feature => `
                                <li><i class="fas fa-check-circle"></i> ${feature}</li>
                            `).join('')}
                        </ul>
                        
                        <div class="trust-badges">
                            <div class="trust-item"><i class="fas fa-money-bill-wave"></i> الدفع عند الاستلام</div>
                            <div class="trust-item"><i class="fas fa-truck-fast"></i> شحن سريع داخل السعودية</div>
                            <div class="trust-item"><i class="fas fa-shield-alt"></i> ضمان الاستبدال عند وجود مشكلة</div>
                            <div class="trust-item"><i class="fas fa-headset"></i> خدمة العملاء</div>
                        </div>
                        
                        <button class="order-btn" id="orderBtn">اطلب الآن</button>
                    </div>
                </div>
                
                <div class="product-description">
                    <h3>وصف المنتج</h3>
                    ${currentProduct.description.split('\n').map(para => `<p>${para}</p>`).join('')}
                </div>
                
                <div class="similar-products">
                    <h3>🔄 منتجات قد تعجبك</h3>
                    <div class="similar-grid" id="similarGrid"></div>
                </div>
            `;
            
            // إضافة منتجات مشابهة
            const similarContainer = document.getElementById('similarGrid');
            const similarProducts = getSimilarProducts(productId, 4);
            
            if (similarContainer && similarProducts.length > 0) {
                similarContainer.innerHTML = similarProducts.map(p => `
                    <div class="similar-card" onclick="window.location.href='product.html?id=${p.id}'">
                        <img src="${p.image}" alt="${p.title}" onerror="this.src='https://placehold.co/200x200?text=Product'">
                        <h4>${p.title.substring(0, 40)}${p.title.length > 40 ? '...' : ''}</h4>
                        <div class="similar-price">${p.price} ر.س</div>
                    </div>
                `).join('');
            }
            
            // معرض الصور
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.addEventListener('click', () => {
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    document.getElementById('mainImage').src = thumb.dataset.img;
                });
            });
            
            // زر الطلب
            const orderBtn = document.getElementById('orderBtn');
            if (orderBtn) {
                orderBtn.addEventListener('click', () => {
                    document.getElementById('orderModal').classList.add('active');
                });
            }
        }
        
        // نموذج الطلب
        const modal = document.getElementById('orderModal');
        const closeModal = document.getElementById('closeModal');
        const orderForm = document.getElementById('orderForm');
        
        if (closeModal) {
            closeModal.onclick = () => modal.classList.remove('active');
        }
        
        window.onclick = (e) => {
            if (e.target === modal) modal.classList.remove('active');
        };
        
        if (orderForm) {
            orderForm.onsubmit = async (e) => {
                e.preventDefault();
                
                if (!currentProduct) return;
                
                const orderData = {
                    product: currentProduct.title,
                    name: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    city: document.getElementById('city').value,
                    address: document.getElementById('address').value,
                    notes: document.getElementById('notes').value,
                    date: new Date().toLocaleString('ar-SA')
                };
                
                // إرسال إلى Telegram (استبدل YOUR_BOT_TOKEN و YOUR_CHAT_ID)
                const botToken = 'YOUR_BOT_TOKEN';
                const chatId = 'YOUR_CHAT_ID';
                const message = `🛒 طلب جديد من متجرك\n\n📦 المنتج: ${orderData.product}\n👤 الاسم: ${orderData.name}\n📞 الهاتف: ${orderData.phone}\n🏙️ المدينة: ${orderData.city}\n📍 العنوان: ${orderData.address}\n📝 ملاحظات: ${orderData.notes || 'لا يوجد'}\n📅 التاريخ: ${orderData.date}`;
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: message })
                    });
                    
                    if (response.ok) {
                        alert('✅ تم إرسال طلبك بنجاح! سنتواصل معك قريباً.');
                        modal.classList.remove('active');
                        orderForm.reset();
                    } else {
                        alert('❌ حدث خطأ، يرجى المحاولة مرة أخرى.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('❌ حدث خطأ في الاتصال، يرجى المحاولة مرة أخرى.');
                }
            };
        }
        
        // بدء تحميل المنتج
        renderProductDetail();
    </script>
</body>
</html>
